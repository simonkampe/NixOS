$scrPath      = ~/.config/hypr/hyprlock/
$imgPath      = ~/.config/hypr/hyprlock/assets/

$USER         = Simon Kämpe # Your Alias
$host         = uname -n #Your Alias
$wifi-mode    = false # Change the WiFi output. true = show SSID, false = Connected.
$bt-mode      = false # Change the Bluetooth output. true = show Device name, false = Connected.

# Hardcode your location (If hardcode does not recognize your City, change it to IP Geolocation provider in weatherinfo.sh)
$CITY         = Jakarta
$COUNTRY      = ID

# WALLPAPER
# Just comment and uncomment to select
$wallpaper    = screenshot
#$wallpaper    = ~/your/wallpaper-path.png
$blur  = 2

# ADJUST HERE
$rounding     = 12
$shape-rd     = -1
$font-text    = FiraCode Nerd Font Bold
$font-text0   = FiraCode Nerd Font
$font-display = FiraCode Nerd Font
$font-symbol  = JetBrainsMono Nerd Font Mono
# Input Var
$weight       = 2
$inner-color  = rgba(0, 0, 0, 0.5)
$border-color = rgba(255, 255, 255, 0.15)

# Colors
$clock-color  = rgba(255, 255, 255, 1)
$fg0          = rgba(255, 255, 255, 1)
$fg1          = rgba(0, 0, 0, 1)
$shape-col0   = rgba(255, 255, 255, 1)
$shape-col1   = rgba(0, 0, 0, 0.25)
$shape-col2   = rgba(255, 255, 255, 0.25)
$shadow-pass  = 2
$shadow-size  = 3
$shadow-color = rgb(0,0,0)
$shadow-boost = 1.2
$text-shadow-pass   = 1
$text-shadow-boost  = 0.5

general {
    no_fade_in          = true
    grace               = 1
    disable_loading_bar = false
    hide_cursor         = true
    ignore_empty_input  = true
    text_trim           = true
    fractional_scaling  = 2
}

background {
    monitor     = 
    path        = $wallpaper

    blur_passes         = $blur
    contrast            = 0.8916
    brightness          = 0.7172
    vibrancy            = 0.1696
    vibrancy_darkness   = 0
}



auth {
    pam:enabled = true
    pam:module = "yubico"
    fingerprint:enabled = false
    fingerprint:ready_message = "(Scan fingerprint to unlock)"
    fingerprint:present_message = "Scanning fingerprint"
}

input-field {
    monitor     =
    size        = 475, 95
    rounding    = $rounding
    
    outline_thickness   = $weight
    outer_color         = $border-color
    dots_size           = 0.1 # Scale of input-field height, 0.2 - 0.8
    dots_spacing        = 1 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center         = true
    
    inner_color         = $inner-color
    font_color          = $fg0
    fade_on_empty       = false
    
    font_family         = $font-text
    placeholder_text    = <span>󰢏 $USER</span>
    hide_input          = false
    
    position            = 0, -140
    halign              = center
    valign              = center
    zindex              = 10
}

# Time hr
label {
    monitor     =
    text        = cmd[update:1000] echo -e "$(date +"%H")" # 24-Hour Format
    color       = $clock-color
    
    shadow_pass         = $shadow-pass
    shadow_size         = $shadow-size
    shadow_color        = $shadow-color
    shadow_boost        = $shadow-boost
    
    font_size           = 175
    font_family         = $font-display 
    
    position            = 0, -155
    halign              = center
    valign              = top
}

label {
    monitor     =
    text        = cmd[update:1000] echo -e "$(date +"%M")"
    color       = $clock-color
    
    shadow_pass         = $shadow-pass
    shadow_size         = $shadow-size
    shadow_color        = $shadow-color
    shadow_boost        = $shadow-boost

    font_size           = 150
    font_family         = $font-display
    
    position            = 0, -365
    halign              = center
    valign              = top
}

# Date
label {
    monitor     =
    text        = cmd[update:1000] bash -c 'day=$(date +%d); case "$day" in 1) suffix="st";; 2) suffix="nd";; 3) suffix="rd";; *) suffix="th";; esac; echo -e "$(date +"%B %e")'$day'$suffix, $(date +%Y)"'

    shadow_passes       = $text-shadow-pass
    shadow_boost        = $text-shadow-boost

    color               = $fg0
    font_size           = 28
    font_family         = $font-text

    position            = 0, -20
    halign              = center
    valign              = center
}

# Battery
label {
    monitor     =
    text        = cmd[update:1000] echo -e "$($scrPath/battery.sh)"
    
    color               = $fg1
    font_size           = 24
    font_family         = $font-text
    
    position            = -37, 29
    halign              = right
    valign              = bottom
    zindex              = 5
}

# Battery background
shape {
    monitor     =
    size        = 160, 60
    
    shadow_passes       = $text-shadow-pass
    shadow_boost        = $text-shadow-boost

    color               = $shape-col0
    rounding            = $shape-rd
    border_size         = 
    border_color        =

    position            = -20, 20
    halign              = right
    valign              = bottom
    zindex              = 1
}

# Network
label {
    monitor     =
    text        = cmd[update:1000] echo -e "$($scrPath/network.sh)"
    
    color               = $fg1
    font_size           = 24
    font_family         = $font-text
    
    position            = 37, 29
    halign              = left
    valign              = bottom
    zindex              = 5
}

# Network background
shape {
    monitor     =
    size        = 280, 60

    shadow_passes       = $text-shadow-pass
    shadow_boost        = $text-shadow-boost

    color               = $shape-col0
    rounding            = $shape-rd
    border_size         = 
    border_color        =

    position            = 20, 20
    halign              = left
    valign              = bottom
    zindex              = 1
}
